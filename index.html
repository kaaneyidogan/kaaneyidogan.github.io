<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Beşiktaş JK</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link href="index.css" rel="stylesheet">
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

    <h1>BEŞİKTAŞ JK</h1>

    <!-- La classe « container » représente la partie où se trouve le contenu. 
     La class « row “ représente les lignes et la class ” col » représente les colonnes. 
     On considère qu'une page web est composée de 12 colonnes. 
     La commande « col-md-4 » permet de diviser le contenu pour couvrir 4 de ces 12 colonnes 
     pour « md », c'est-à-dire « medium device ».-->

    <div class="container">
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <img class="card-img-top" src="images/bjk.png" alt="Beşiktaş JK">
                    <div class="card-body">
                        <h5 class="card-title">BJK</h5>
                        <p class="card-text">Beşiktaş JK (TUR)</p>
                        <i class="bi bi-arrow-bar-right"></i>
                        <a href="https://bjk.com.tr/en/" target="_blank" class="btn btn-dark">BJK Website</a>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div id="carouselExampleIndicators" class="carousel slide" data-bs-ride="carousel">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                            <img class="d-block w-100" src="images/stadium.jpg" alt="Besiktas JK Stadium">
                        </div>
                        <div class="carousel-item">
                            <img class="d-block w-100" src="images/team.jpg" alt="Besiktas JK Football Team">
                        </div>
                        <div class="carousel-item">
                            <img class="d-block w-100" src="images/fans.jpg" alt="Besiktas JK Fans">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="ms-md-5">
                    <p>Une autre place pour ms-md-5</p>
                </div>
            </div>
        </div>
    </div>

<!-- m est la classe qui définit la « marge »,
s représente le « début (start) »,
ms signifie donc « marge-gauche », 
md signifie « medium device » 
et le 5 est la valeur de la marge. 
Donc « ms-md-5 » signifie 
« marge de 5 rem à partir de la gauche pour medium devices et/ou plus grands ».-->

    <blockquote class="blockquote">
        <p>"Notre principe, c'est Beşiktaş JK. Abandonner le principe, c'est un suicide."</p>
    </blockquote>
    <figcaption class="blockquote-footer">
        Goodfellas <cite title="Source Title">un groupe de fans de Beşiktaş JK</cite>
    </figcaption>

</body>

</html>
